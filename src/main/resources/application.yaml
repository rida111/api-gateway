spring:
  application:
    name: "apigateway"

  config:
    import: "optional:configserver:http://localhost:8071/"

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
#configuration to enable gateway related endpoints inside the actuator:
  endpoint:
    gateway:
      enabled: true
  info:
    env:
      enabled: true



info:
  app:
    name: "gatewayserver"
    description: "blah blah api-gateway application"
    version: "1.6"